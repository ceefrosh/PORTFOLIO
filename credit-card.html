<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit-Card Flip</title>
  <link rel="stylesheet" href="credit-card.css">
  
</head>
<body>
  <!-- card container that provides 3D perspective -->
    <div class="card-container">
      <div class="card" id="card">
        <div class="card-face card-front">
           <div class="chip"><img src="IMG/chip.jpeg" width="50px" height="40px" alt=""></div>
           <div class="card-number">1234 5678 9012 3456</div>
            <div class="card-details">
              <div class="card-name">
                 <span class="label">Card Holder</span>
                 <span class="value">Lawal Saheed</span>

              </div>
              <div class="card-info">
                <span class="label">Expires</span>
                <span class="value">06/29</span>
              </div>
              
            </div>
          
          <div class="visa-logo">VISA</div>




        </div>
        <div class="card-face card-back">
          <div class="magnetic-strip"></div>
          <div class="white-strip"></div>
          <div class="cvv-box">
            <span class="cvv">CVV</span>
            <span class="number">123</span>
          </div>
          <div class="info-text">
            This card is property of the issuing bank
          </div>
        </div>

        
        <script src="credit-card.js"></script> 

      </div>

        
          
         
        

        

      
      
     
      
    
    </div>
    

  
   
  
</body>
</html>
